<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
    }
    .card {
        border-radius: 15px;
        padding: 2rem;
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }
    .btn-custom {
        border-radius: 50px;
        padding: 0.6rem 1.5rem;
        font-weight: 600;
        margin: 0.5rem;
    }
</style>
</head>
<body>

<div class="card text-center bg-white text-dark">
    {% if session.get('fullname') %}
        <h2 class="mb-3">Welcome, <span class="text-primary">{{ session.get('fullname') }}</span>!</h2>
        <p class="mb-3">Username: <strong>{{ session.get('username') }}</strong></p>
        <a href="/logout" class="btn btn-danger btn-custom">Logout</a>
    {% else %}
        <h2 class="mb-4">Welcome to Our Platform!</h2>
        <p class="mb-4">Login or Register to get started</p>
        <a href="/login" class="btn btn-primary btn-custom">Login</a>
        <a href="/register" class="btn btn-success btn-custom">Register</a>
    {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
